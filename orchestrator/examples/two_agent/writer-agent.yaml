name: writer-agent
command:
  - python
  - -c
  - |
    import tempfile
    from pathlib import Path
    handoff = Path(tempfile.gettempdir()) / "agent-handoff" / "research.txt"
    output = Path(tempfile.gettempdir()) / "agent-handoff" / "final.txt"
    notes = handoff.read_text(encoding="utf-8").strip()
    output.write_text(
        "Final summary\n"
        "=============\n"
        f"{notes}\n",
        encoding="utf-8",
    )
    print(f"[AGENT] final output written to {output}")
allowed_hosts: []
allowed_paths:
  - /tmp/agent-handoff/
env:
  PYTHONUNBUFFERED: "1"
user: "65534"
timeout: "5m"
description: "Local-only writer agent that reads the handoff file and produces the final output."
